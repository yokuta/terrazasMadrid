<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test R2</title>
</head>
<body>

<button onclick="test()">Probar R2</button>

<pre id="out"></pre>

<script>

const URL = "https://5a58dea4d021e5c8c12f0d6b08b1eceb.r2.cloudflarestorage.com/terrazasmadrid/prueba.txt";

async function test() {
  const out = document.getElementById("out");
  out.textContent = "Cargando...\n";

  try {
    const res = await fetch(URL);
    out.textContent += "Status: " + res.status + "\n";

    const text = await res.text();
    out.textContent += "Contenido:\n" + text;

  } catch (err) {
    out.textContent += "ERROR: " + err;
  }
}

</script>

</body>
</html>
