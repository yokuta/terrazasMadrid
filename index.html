<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Visor de Sombras · Terrazas</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --bg:         #eef2f6;
      --bg-soft:    #f5f7fa;
      --panel:      #ffffff;
      --panel-2:    #f3f6fa;
      --panel-3:    #eaf0f7;

      --text:       #16202b;
      --muted:      #66788a;
      --muted-2:    #8a98a8;

      --brand:      #005ea8;
      --brand-2:    #0a74c9;
      --brand-3:    #dbe9f6;
      --brand-dark: #0f3d68;

      --shadow-fill:#40566f;
      --shadow-line:#24374d;
      --shadow-soft:#7e93a8;

      --border:     rgba(22, 32, 43, 0.10);
      --border-2:   rgba(0, 94, 168, 0.14);

      --shadow-sm:  0 2px 8px rgba(15, 36, 61, 0.06);
      --shadow-md:  0 10px 28px rgba(15, 36, 61, 0.10);
      --shadow-lg:  0 24px 70px rgba(15, 36, 61, 0.16);

      --radius-sm:  12px;
      --radius-md:  20px;
      --radius-lg:  28px;
      --radius-xl:  36px;

      --font-display: 'DM Serif Display', serif;
      --font-body: 'DM Sans', sans-serif;

      --sheet-peek: 165px;
      --sheet-mid: 52vh;
      --sheet-full: 72vh;

      --transition: cubic-bezier(0.32, 0.72, 0, 1);

      /* FAB column width on desktop */
      --fab-col-width: 52px;
      --fab-col-right: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
    }

    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at top left, rgba(0,94,168,0.05), transparent 32%),
        linear-gradient(180deg, #f7f9fc 0%, #eef3f8 100%);
    }

    .leaflet-control-attribution {
      font-size: 10px !important;
      background: rgba(255,255,255,0.82) !important;
      color: var(--muted) !important;
      border-radius: 8px 0 0 0;
      backdrop-filter: blur(8px);
    }

    .leaflet-control-zoom a {
      background: rgba(255,255,255,0.94) !important;
      color: var(--brand-dark) !important;
      border: 1px solid var(--border) !important;
      box-shadow: var(--shadow-sm);
    }

    /* ════════════════════════════════════════
       SEARCH OVERLAY
    ════════════════════════════════════════ */
    #search-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 400;
      padding: 10px 10px 0;
      pointer-events: none;
    }

    #search-wrap {
      pointer-events: all;
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }

    #search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-lg);
      padding: 0 14px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(12px);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    #search-bar:focus-within {
      border-color: var(--brand-2);
      box-shadow: var(--shadow-lg), 0 0 0 4px rgba(10,116,201,0.10);
      transform: translateY(-1px);
    }

    .search-icon {
      flex-shrink: 0;
      color: var(--brand);
      opacity: 0.85;
    }

    #rotuloSearchInput {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      padding: 12px 0;
      outline: none;
    }

    #rotuloSearchInput::placeholder {
      color: var(--muted);
      opacity: 0.8;
    }

    #search-clear {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      background: var(--panel-3);
      color: var(--brand-dark);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      opacity: 0.9;
      transition: opacity 0.15s, background 0.15s, transform 0.15s;
    }

    #search-clear:hover {
      opacity: 1;
      background: #d6e7f7;
      transform: scale(1.03);
    }

    #search-clear.visible {
      display: flex;
    }

    #autocompleteList {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      max-height: 40vh;
      overflow-y: auto;
      display: none;
      overscroll-behavior: contain;
      backdrop-filter: blur(10px);
      z-index: 500;
    }

    #autocompleteList.open {
      display: block;
    }

    .ac-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(22,32,43,0.06);
      transition: background 0.12s;
    }

    .ac-item:last-child { border-bottom: none; }

    .ac-item:hover,
    .ac-item.active {
      background: rgba(0,94,168,0.06);
    }

    .ac-pin {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .ac-text { flex: 1; min-width: 0; }

    .ac-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ac-sub {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.95;
      margin-top: 1px;
    }

    /* ════════════════════════════════════════
       BOTTOM SHEET
    ════════════════════════════════════════ */
    #sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 300;
      background: rgba(255,255,255,0.97);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      box-shadow: 0 -8px 40px rgba(15,36,61,0.12);
      transition: height 0.42s var(--transition);
      max-width: 100vw;
      touch-action: pan-y;
      overflow: hidden;
      height: var(--sheet-peek);
      border-top: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: column;
    }

    #sheet[data-state="peek"] { height: var(--sheet-peek); }
    #sheet[data-state="mid"]  { height: var(--sheet-mid); }
    #sheet[data-state="full"] { height: var(--sheet-full); }

    #sheet-handle-area {
      padding: 10px 0 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      user-select: none;
    }

    #sheet-handle-area:active { cursor: grabbing; }

    .handle-pill {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(102,120,138,0.35);
    }

    #sheet-content {
      padding: 46px 16px 16px;
      overflow-y: auto;
      overscroll-behavior: contain;
      position: relative;
      flex: 1;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }

    #sheet-close {
      position: absolute;
      top: 4px;
      right: 14px;
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: var(--panel-3);
      color: var(--brand-dark);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      box-shadow: var(--shadow-sm);
    }

    #sheet-close:hover { background: #d6e7f7; }

    #place-header { display: none; }

    #place-name {
      font-family: var(--font-display);
      font-size: 20px;
      line-height: 1.2;
      color: var(--text);
      flex: 1;
    }

    #place-name.empty {
      color: var(--muted-2);
      font-style: italic;
    }

    #shadow-ring-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      background:
        linear-gradient(135deg, rgba(219,233,246,0.7), rgba(243,246,250,0.92)),
        radial-gradient(circle at top right, rgba(0,94,168,0.08), transparent 40%);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-sm);
    }

    .ring-svg-wrap {
      flex-shrink: 0;
      position: relative;
      width: 64px;
      height: 64px;
    }

    .ring-svg-wrap svg {
      width: 64px;
      height: 64px;
      transform: rotate(-90deg);
    }

    #ring-track { stroke: rgba(0,94,168,0.14); }

    #ring-fill {
      stroke: var(--brand);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.7s var(--transition);
      filter: drop-shadow(0 2px 5px rgba(0,94,168,0.18));
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.1;
      color: var(--brand-dark);
    }

    .ring-label span {
      font-size: 9px;
      font-weight: 500;
      color: var(--muted);
      opacity: 1;
    }

    .shadow-info { flex: 1; }

    .shadow-info .info-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--brand);
      opacity: 0.95;
      margin-bottom: 4px;
    }

    .shadow-info .info-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--brand-dark);
      line-height: 1;
    }

    .shadow-info .info-note {
      font-size: 11px;
      color: var(--muted);
      opacity: 1;
      margin-top: 4px;
    }

    .ctrl-section { margin-bottom: 12px; }

    .ctrl-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      opacity: 1;
      margin-bottom: 6px;
    }

    #dateInput {
      width: 100%;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }

    #dateInput:focus {
      border-color: var(--brand-2);
      box-shadow: 0 0 0 3px rgba(10,116,201,0.10);
    }

    .hour-track-wrap {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px 8px;
    }

    .hour-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .hour-hint {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      opacity: 1;
    }

    .hour-badge {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 18px;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(0,94,168,0.18);
    }

    .hour-range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      opacity: 1;
      margin-top: 6px;
    }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(0,94,168,0.18), rgba(0,94,168,0.10));
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid var(--brand);
      box-shadow: 0 2px 10px rgba(0,94,168,0.22);
      cursor: grab;
    }

    input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; }

    input[type=range]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid var(--brand);
      box-shadow: 0 2px 10px rgba(0,94,168,0.22);
      cursor: grab;
    }

    #status-pill {
      position: fixed;
      bottom: calc(var(--sheet-peek) + 12px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 350;
      background: var(--brand-dark);
      color: #ffffff;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 20px;
      white-space: nowrap;
      box-shadow: var(--shadow-md);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s, bottom 0.42s var(--transition);
    }

    #status-pill.visible { opacity: 1; }
    #status-pill.error { background: #a61d24; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #no-result {
      display: none;
      text-align: center;
      padding: 18px 0 10px;
      color: var(--muted);
      opacity: 1;
    }

    #no-result svg { margin-bottom: 8px; }
    #no-result p { font-size: 13px; }

    .hidden { display: none !important; }

    .terrace-info-section { margin-top: 6px; }

    .terrace-info-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      display: grid;
      gap: 10px;
      box-shadow: var(--shadow-sm);
    }

    .terrace-info-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--brand-dark);
      line-height: 1.2;
    }

    .terrace-info-subtitle {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .terrace-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-pill {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .info-pill-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .info-pill-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .terrace-info-list { display: grid; gap: 8px; }

    .terrace-info-item {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
    }

    .terrace-info-item .info-pill-label { margin-bottom: 4px; }

    .terrace-info-item .info-pill-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--brand-dark);
      word-break: break-word;
    }

    .terrace-marker {
      background: var(--brand);
      border: 2px solid white;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,94,168,0.28);
    }

    .terrace-marker.selected {
      background: var(--brand-dark);
      transform: scale(1.1);
    }

    /* ════════════════════════════════════════
       SHADOW LEGEND
    ════════════════════════════════════════ */
    #shadow-legend {
      position: fixed;
      left: 12px;
      bottom: calc(var(--sheet-peek) + 16px);
      z-index: 345;
      min-width: 170px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border-2);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
      transition: opacity 0.2s, transform 0.2s;
    }

    #shadow-legend.hidden {
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
    }

    .legend-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .legend-scale {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 6px;
    }

    .lg-stop {
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.75);
    }

    .lg-stop.shade { background: #2f6fb3; }
    .lg-stop.soft  { background: #6fa8dc; }
    .lg-stop.warm  { background: #f4b942; }
    .lg-stop.sun   { background: #d8572a; }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 10px;
      color: var(--muted);
    }

    .sheet-top-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--brand);
      margin-bottom: 6px;
      display: block;
    }

    .divider {
      height: 1px;
      background: rgba(22,32,43,0.08);
      margin: 12px 0;
    }

    #sheet-content::-webkit-scrollbar { width: 4px; }
    #sheet-content::-webkit-scrollbar-track { background: transparent; }
    #sheet-content::-webkit-scrollbar-thumb {
      background: rgba(102,120,138,0.25);
      border-radius: 2px;
    }

    /* ════════════════════════════════════════
       USER LOCATION MARKER (improved)
    ════════════════════════════════════════ */
    .user-loc-pulse {
      position: relative;
      width: 16px;
      height: 16px;
    }

    @keyframes locPulse {
      0%   { transform: scale(1);   opacity: 0.55; }
      100% { transform: scale(2.6); opacity: 0; }
    }

    /* ════════════════════════════════════════
       MOBILE LAYOUT  (< 720px)
    ════════════════════════════════════════ */
    @media (max-width: 719px) {
      #desktop-label,
      #place-divider {
        display: none !important;
      }

      /* ── Section A: Horizontal scroll filter bar ── */
      #mobile-filters-bar {
		  display: flex;
		  align-items: center;
		  gap: 8px;
		  margin-top: 8px;
		  padding-right: 62px;
		  overflow-x: auto;
		  overflow-y: visible;
		  -webkit-overflow-scrolling: touch;
		  scroll-behavior: smooth;
		  pointer-events: all;
		  scrollbar-width: none;
		  -ms-overflow-style: none;
		  flex-wrap: nowrap;
		  position: relative;
		  z-index: 430;
		}

      #mobile-filters-bar::-webkit-scrollbar { display: none; }

      /* ── Section B: FAB column — fixed right side ── */
      #fab-column {
		  display: flex;
		  flex-direction: column;
		  gap: 8px;
		  position: fixed;
		  right: 10px;
		  top: 64px;
		  z-index: 420;
		  pointer-events: all;
		}

      .fab-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: rgba(255,255,255,0.96);
        border: 1px solid var(--border-2);
        box-shadow: var(--shadow-md);
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        backdrop-filter: blur(10px);
        cursor: pointer;
        transition: transform 0.18s, box-shadow 0.18s;
        flex-shrink: 0;
      }

      .fab-btn:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-lg);
      }

      .fab-btn.locating {
        animation: locatePulse 1s ease-in-out infinite alternate;
      }

      @keyframes locatePulse {
        from { box-shadow: var(--shadow-md); }
        to   { box-shadow: 0 0 0 4px rgba(0,94,168,0.18), var(--shadow-md); }
      }

      /* ── Filter chips ── */
      .filter-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        height: 38px;
        flex-shrink: 0;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--border-2);
        background: rgba(255,255,255,0.97);
        color: var(--brand-dark);
        font-family: var(--font-body);
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        box-shadow: var(--shadow-md);
        backdrop-filter: blur(10px);
        cursor: pointer;
        transition: transform 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
      }

    /* ════════════════════════════════════════
       SHEET DRAG
    ════════════════════════════════════════ */
    let sheetState = 'peek';
    let dragStartY = 0, dragStartState = 'peek', isDragging = false, dragDelta = 0;

    const peekH = () => parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sheet-peek')) || 116;
    const midH  = () => window.innerHeight * 0.34;
    const fullH = () => window.innerHeight * 0.72;

    function isMobileLayout() { return window.innerWidth < 720; }

    function normalizeText(text) {
      return String(text ?? '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim().replace(/\s+/g, ' ');
    }

    function normalizeActivityType(value) {
      const txt = normalizeText(value);
      if (!txt || txt === 'sin clasificar' || txt === 'no hosteleria') return '';
      return txt;
    }

    function matchesActivityType(feature, selectedType) {
      if (!selectedType) return true;
      const activity = normalizeActivityType(feature?.properties?.tipo_actividad);
      const meta = TYPE_OPTION_META[selectedType];
      if (!meta || !Array.isArray(meta.match) || !meta.match.length) return true;
      return meta.match.some(m => activity.includes(m));
    }

    function updateLegendVisibility() {
      if (!shadowLegend) return;
      const shouldShow = isMobileLayout() && sheetState === 'peek';
      shadowLegend.classList.toggle('hidden', !shouldShow);
    }

    function setSheetState(state, animate = true) {
      sheetState = state;
      if (!animate) sheet.style.transition = 'none';
      sheet.dataset.state = state;
      if (!animate) setTimeout(() => { sheet.style.transition = ''; }, 50);
      const h = state === 'peek' ? peekH() : state === 'mid' ? midH() : fullH();
      statusPill.style.bottom = (h + 12) + 'px';
      updateLegendVisibility();
    }

    function onDragStart(clientY) { isDragging = true; dragStartY = clientY; dragStartState = sheetState; dragDelta = 0; sheet.style.transition = 'none'; }
    function onDragMove(clientY) { if (!isDragging) return; dragDelta = dragStartY - clientY; }
    function onDragEnd() {
      if (!isDragging) return;
      isDragging = false;
      sheet.style.transition = '';
      const threshold = 60;
      if (dragStartState === 'peek') {
        setSheetState(dragDelta > threshold ? 'mid' : 'peek');
      } else if (dragStartState === 'mid') {
        if (dragDelta > threshold) setSheetState('full');
        else if (dragDelta < -threshold) setSheetState('peek');
        else setSheetState('mid');
      } else {
        setSheetState(dragDelta < -threshold ? 'mid' : 'full');
      }
    }

    handleArea.addEventListener('touchstart', e => { onDragStart(e.touches[0].clientY); }, { passive: true });
    handleArea.addEventListener('touchmove', e => { onDragMove(e.touches[0].clientY); }, { passive: true });
    handleArea.addEventListener('touchend', () => onDragEnd());
    handleArea.addEventListener('mousedown', e => onDragStart(e.clientY));
    document.addEventListener('mousemove', e => { if (isDragging) onDragMove(e.clientY); });
    document.addEventListener('mouseup', () => { if (isDragging) onDragEnd(); });

    sheetClose.addEventListener('click', () => {

    /* ════════════════════════════════════════
       STATUS PILL
    ════════════════════════════════════════ */
    let statusTimeout = null;

    function showStatus(msg, isError = false, loading = false) {
      statusPill.innerHTML = loading ? `<span class="spinner"></span>${msg}` : msg;
      statusPill.className = 'visible' + (isError ? ' error' : '');
      clearTimeout(statusTimeout);
      if (!loading) {
        statusTimeout = setTimeout(() => { statusPill.className = ''; }, 2800);
      }
    }

    function hideStatus() {
      clearTimeout(statusTimeout);
      statusPill.className = '';
    }

    function updateHour(hour) { hourBadge.textContent = `${String(hour).padStart(2, '0')}:00`; }
    function clampHour(hour) { return Math.max(6, Math.min(21, Number(hour))); }
    function isFiniteNumber(v) { return Number.isFinite(Number(v)); }

    function toNumberOrNull(v) {
      if (v === null || v === undefined) return null;
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function escapeHtml(str) {
      return String(str ?? '')
        .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
    }

    function toNumberOrNull2(v) { return toNumberOrNull(v); }

    function toIntOrDash(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : '—';
    }

    function safeText(v) {
      if (v === null || v === undefined || v === '') return '—';
      return String(v).trim() || '—';
    }

    /* ════════════════════════════════════════
       USER LOCATION — PERSISTENCE
    ════════════════════════════════════════ */
    function saveUserLocation(lat, lng) {
      const data = { lat, lng, timestamp: new Date().toISOString() };
      try {
        localStorage.setItem(USER_LOC_STORAGE_KEY, JSON.stringify(data));
      } catch (e) { /* localStorage might be unavailable */ }
      userLocationData = data;
      updateExportBtnVisibility();
    }

    function loadSavedUserLocation() {
      try {
        const raw = localStorage.getItem(USER_LOC_STORAGE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (typeof data.lat === 'number' && typeof data.lng === 'number') return data;
      } catch (e) {}
      return null;
    }


    function updateExportBtnVisibility() {
      /**/
    }

    /* ════════════════════════════════════════
       USER LOCATION MARKER (improved)
    ════════════════════════════════════════ */
    function showUserLocationMarker(lat, lng) {
      if (userLocationHalo) { map.removeLayer(userLocationHalo); userLocationHalo = null; }
      if (userLocationMarker) { map.removeLayer(userLocationMarker); userLocationMarker = null; }

      /* Outer pulsing halo */
      userLocationHalo = L.circleMarker([lat, lng], {
        radius: 20,
        color: '#00bcd4',
        weight: 1.5,
        fillColor: '#00bcd4',
        fillOpacity: 0.12,
        className: 'user-loc-halo',
      }).addTo(map);

      /* Inner dot — distinct turquoise color */
      userLocationMarker = L.circleMarker([lat, lng], {
        radius: 7,
        color: '#ffffff',
        weight: 2.5,
        fillColor: '#00bcd4',
        fillOpacity: 1,
        className: 'user-loc-dot',
      }).addTo(map);

      /* Add CSS pulse animation to the halo */
      const halosEl = document.querySelectorAll('.user-loc-halo');
      halosEl.forEach(el => {
        el.style.animation = 'locPulse 2s ease-out infinite';
      });
    }

    /* ════════════════════════════════════════
       GEOLOCATION BUTTON
    ════════════════════════════════════════ */
    function handleLocate() {
      if (!navigator.geolocation) {
        showStatus('Geolocalización no disponible', true);
        return;
      }
      fabLocate.classList.add('locating');
      showStatus('Obteniendo ubicación…', false, true);

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude: lat, longitude: lng } = pos.coords;
          fabLocate.classList.remove('locating');
          hideStatus();

          saveUserLocation(lat, lng);
          showUserLocationMarker(lat, lng);
          map.flyTo([lat, lng], Math.max(map.getZoom(), 15), { duration: 0.6 });
        },
        (err) => {
          fabLocate.classList.remove('locating');
          const msgs = { 1: 'Permiso denegado', 2: 'Posición no disponible', 3: 'Tiempo agotado' };
          showStatus(msgs[err.code] || 'Error de geolocalización', true);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
      );
    }

    fabLocate?.addEventListener('click', handleLocate);

    /* ════════════════════════════════════════
       SHADOW QUERY HELPERS
    ════════════════════════════════════════ */
    function buildAllTerracesShadowQuery(alias, selectedDate, selectedHour) {
      const representativeDate = getRepresentativeWednesdayDateForSelectedWeek(selectedDate);
      return `
        SELECT terraza_id, shadow_pct
        FROM read_parquet('${alias}')
        WHERE substr(coalesce(cast(date as varchar), cast(datetime as varchar)), 1, 10) = '${representativeDate}'
          AND EXTRACT(HOUR FROM datetime) = ${Number(selectedHour)}
      `;
    }

    async function refreshTerraceShadowColors() {
      if (!db || !conn || !terracesGeojson) return;
      const selectedDate = dateInput.value;
      const selectedHour = Number(hourSlider.value);
      try {
        const { alias } = await ensureWeekRegistered(selectedDate);
        const sql = buildAllTerracesShadowQuery(alias, selectedDate, selectedHour);
        const result = await conn.query(sql);
        const rows = await arrowTableToRows(result);
        shadowByTerraceId.clear();
        for (const row of rows) {
          const tid = Number(row.terraza_id);
          if (Number.isFinite(tid)) shadowByTerraceId.set(tid, row.shadow_pct);
        }
        renderTerracesLayer();
      } catch (err) {
        console.error('Error actualizando colores de sombra:', err);
      }
    }

    function updateRing(pct) {
      if (pct === null) {
        ringFill.style.strokeDashoffset = RING_CIRCUMFERENCE;

        shadowPctVal.textContent = '—';

      const capped = Math.min(pct, 100);

    /* ── Date helpers ── */
    function toYMD(value) {
      if (!value) return null;
      if (typeof value === 'string') { const m = value.match(/^(\d{4}-\d{2}-\d{2})/); if (m) return m[1]; }
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return null;
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function getHourFromDatetime(value) {
      if (!value) return null;
      if (typeof value === 'string') {
        const m = value.match(/T(\d{2}):/); if (m) return Number(m[1]);
        const m2 = value.match(/ (\d{2}):/); if (m2) return Number(m2[1]);
      }
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? null : d.getHours();
    }

    function getIsoWeekInfo(dateString) {
      const date = new Date(dateString + 'T00:00:00');
      if (Number.isNaN(date.getTime())) throw new Error(`Fecha inválida: ${dateString}`);
      const tmp = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = tmp.getUTCDay() || 7;
      tmp.setUTCDate(tmp.getUTCDate() + 4 - dayNum);
      const isoYear = tmp.getUTCFullYear();
      const yearStart = new Date(Date.UTC(isoYear, 0, 1));
      const isoWeek = Math.ceil((((tmp - yearStart) / 86400000) + 1) / 7);
      return { isoYear, isoWeek };
    }

    function getIsoWeekDate(isoYear, isoWeek, isoWeekday) {
      const simple = new Date(Date.UTC(isoYear, 0, 4 + (isoWeek - 1) * 7));
      const dow = simple.getUTCDay() || 7;
      simple.setUTCDate(simple.getUTCDate() - dow + isoWeekday);
      return `${simple.getUTCFullYear()}-${String(simple.getUTCMonth()+1).padStart(2,'0')}-${String(simple.getUTCDate()).padStart(2,'0')}`;
    }

    function getRepresentativeWednesdayDateForSelectedWeek(selectedDate) {
      const { isoWeek } = getIsoWeekInfo(selectedDate);
      return getIsoWeekDate(FILE_YEAR_IN_BUCKET, isoWeek, 3);
    }

    function buildWeekFileName(dateString) {
      const { isoWeek } = getIsoWeekInfo(dateString);
      return `${FILE_BASENAME}_${FILE_YEAR_IN_BUCKET}_W${String(isoWeek).padStart(2,'0')}${FILE_SUFFIX}`;
    }

    function buildWeekUrl(dateString) { return `${BUCKET_BASE_URL}/${buildWeekFileName(dateString)}`; }

    function buildWeekAlias(dateString) {
      const { isoWeek } = getIsoWeekInfo(dateString);
      return `week_${FILE_YEAR_IN_BUCKET}_W${String(isoWeek).padStart(2,'0')}.parquet`;
    }

    /* ── Projection ── */
    function transformCoords25830To4326(coords) {
      if (!Array.isArray(coords)) return coords;
      if (coords.length >= 2 && !Array.isArray(coords[0])) {
        const x = Number(coords[0]), y = Number(coords[1]);
        if (!isFiniteNumber(x) || !isFiniteNumber(y)) throw new Error('Coordenadas no finitas');
        const result = proj4(SOURCE_EPSG, TARGET_EPSG, [x, y]);
        const lon = Number(result[0]), lat = Number(result[1]);
        if (!isFiniteNumber(lon) || !isFiniteNumber(lat)) throw new Error('Reproyección inválida');
        return [lon, lat];
      }
      return coords.map(transformCoords25830To4326);
    }

    function reprojectGeometry(geometry) {
      if (!geometry?.type) return null;
      if (geometry.type === 'GeometryCollection') {
        return { ...geometry, geometries: (geometry.geometries || []).map(reprojectGeometry).filter(Boolean) };
      }
      if (!geometry.coordinates) return null;
      return { ...geometry, coordinates: transformCoords25830To4326(geometry.coordinates) };
    }

    function toUint8Array(value) {
      if (!value) return null;
      if (value instanceof Uint8Array) return value;
      if (value instanceof ArrayBuffer) return new Uint8Array(value);
      if (Array.isArray(value)) return new Uint8Array(value);
      if (ArrayBuffer.isView(value)) return new Uint8Array(value.buffer, value.byteOffset, value.byteLength);
      if (typeof value === 'object') {
        const vals = Object.values(value);
        if (vals.length && vals.every(v => Number.isFinite(Number(v)))) return new Uint8Array(vals.map(v => Number(v)));
      }
      return null;
    }

    function isLikelyGeoJSONGeometry(value) {
      return value && typeof value === 'object' && typeof value.type === 'string' &&
        (Array.isArray(value.coordinates) || Array.isArray(value.geometries));
    }

    function decodeWkbGeometry(value) {
      if (!value) throw new Error('geometry vacía');
      if (typeof value === 'string') return wkx.Geometry.parse(value).toGeoJSON();
      const bytes = toUint8Array(value);
      if (!bytes) throw new Error('No se pudo convertir geometry');
      return wkx.Geometry.parse(Buffer.from(bytes)).toGeoJSON();
    }

    function getGeometryFromRow(row, rowIndex) {
      const raw = row.geometry;
      if (!raw) throw new Error(`Fila ${rowIndex}: geometry vacía`);
      if (isLikelyGeoJSONGeometry(raw)) return raw;
      return decodeWkbGeometry(raw);
    }

    function rowToFeature(row, rowIndex = null) {
      const sourceGeometry = getGeometryFromRow(row, rowIndex);
      const geom4326 = reprojectGeometry(sourceGeometry);
      if (!geom4326) throw new Error(`Fila ${rowIndex}: no se pudo reproyectar`);
      return {
        type: 'Feature',
        geometry: geom4326,
        properties: {
          terraza_id: Number(row.terraza_id),
          rotulo: row.rotulo ?? '',
          datetime: row.datetime,
          date: toYMD(row.date ?? row.datetime),
          hour: getHourFromDatetime(row.datetime),
          shadow_area_m2: row.shadow_area_m2,
          shadow_pct: row.shadow_pct,
          terrace_area_m2: row.terrace_area_m2,
          building_id: row.building_id,
        },
      };
    }

    function normalizeDuckRow(row) {
      if (!row) return row;
      if (typeof row.toJSON === 'function') return row.toJSON();
      const obj = {};
      for (const key of Object.keys(row)) {
        const value = row[key];
        obj[key] = (value && typeof value.toJSON === 'function') ? value.toJSON() : value;
      }
      return obj;
    }

    async function arrowTableToRows(table) {
      if (!table) return [];
      const arr = table.toArray ? table.toArray() : [];
      return arr.map(normalizeDuckRow);
    }

    /* ── Catalog loading ── */
    async function loadRotulosCatalog() {
      try {
        const res = await fetch(ROTULOS_JSON_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`No se pudo leer ${ROTULOS_JSON_URL}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error('El JSON de rótulos no es un array');
        rotulosCatalog = data.map(item => ({
          ...item,
          terraza_id: Number(item.terraza_id),
          _search_blob: normalizeText([
            item.label_busqueda, item.rotulo_formateado, item.rotulo_original,
            item.direccion_resumen, item.nombre_via, item.numero_via
          ].filter(Boolean).join(' '))
        })).filter(item => Number.isFinite(item.terraza_id));
      } catch (err) {
        console.error(err);
        showStatus('No se pudo cargar el catálogo de rótulos', true);
      }
    }

    async function loadTerracesGeojson() {
      try {
        const res = await fetch(TERRACES_GEOJSON_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`No se pudo leer ${TERRACES_GEOJSON_URL}`);
        const data = await res.json();
        if (!data || data.type !== 'FeatureCollection' || !Array.isArray(data.features)) throw new Error('GeoJSON inválido');
        terracesGeojson = data;
        buildTypeDropdownOptions();
        renderTerracesLayer();
      } catch (err) {
        console.error(err);
        showStatus('No se pudo cargar la capa de terrazas', true);
      }
    }

    /* ════════════════════════════════════════
       TYPE FILTER
    ════════════════════════════════════════ */
    const TYPE_OPTION_META = {
      '':                     { label: 'Todos',        icon: '🗂️', match: [] },
      'bar':                  { label: 'Bar',           icon: '🍺', match: ['bar'] },
      'restaurante':          { label: 'Restaurante',   icon: '🍽️', match: ['restaurante'] },
      'cafeteria':            { label: 'Cafetería',     icon: '☕', match: ['cafeteria'] },
      'cerveceria / taberna': { label: 'Cervecería',    icon: '🍻', match: ['cerveceria', 'taberna'] },
      'comida rapida':        { label: 'Fast food',     icon: '🌮', match: ['comida rapida', 'fast food'] },
      'heladeria / dulces':   { label: 'Heladería',     icon: '🍦', match: ['heladeria', 'dulces'] },
    };

    function buildTypeOptionHTML(value, isSelected) {
      const meta = TYPE_OPTION_META[value] || { label: formatActivityLabel(value), icon: '📍' };
      return `
        <div
          class="type-option${isSelected ? ' selected' : ''}"
          role="option"
          aria-selected="${isSelected}"
          data-value="${escapeHtml(value)}"
        >
          <svg class="type-option-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span class="type-option-icon" aria-hidden="true">${meta.icon}</span>
          <span>${escapeHtml(meta.label)}</span>
        </div>
      `;
    }

    function buildTypeDropdownOptions() {
      if (!terracesGeojson?.features?.length) return;

      const existingValues = new Set();
      for (const feature of terracesGeojson.features) {
        const activity = normalizeActivityType(feature?.properties?.tipo_actividad);
        if (activity && activity !== 'hosteleria otros') existingValues.add(activity);
      }

      const preferredOrder = ['', 'bar', 'restaurante', 'cafeteria', 'cerveceria / taberna', 'comida rapida', 'heladeria / dulces'];
      const visibleOptions = preferredOrder.filter(value => {
        if (value === '') return true;
        const meta = TYPE_OPTION_META[value];
        if (!meta?.match) return false;
        return Array.from(existingValues).some(activity => meta.match.some(m => activity.includes(m)));
      });

      const html = visibleOptions.map(v => buildTypeOptionHTML(v, v === activityTypeFilter)).join('');

      /* Mobile dropdown */
      if (typeFilterDropdown) {
        typeFilterDropdown.innerHTML = html;
        typeFilterDropdown.querySelectorAll('.type-option').forEach(el => {
          el.addEventListener('click', () => selectTypeOption(el.dataset.value, 'mobile'));
        });
      }

      /* Desktop dropdown */
      if (desktopTypeDropdown) {
        desktopTypeDropdown.innerHTML = html;
        desktopTypeDropdown.querySelectorAll('.type-option').forEach(el => {
          el.addEventListener('click', () => selectTypeOption(el.dataset.value, 'desktop'));
        });
      }
    }

    function selectTypeOption(value, source = 'mobile') {
      activityTypeFilter = value || '';
      const meta = TYPE_OPTION_META[activityTypeFilter] || { label: 'Todos', icon: '🗂️' };

      /* Update mobile UI */
      if (typeBtnLabelText) typeBtnLabelText.textContent = meta.label || 'Todos';
      if (typeFilterBtn) typeFilterBtn.classList.toggle('has-value', !!activityTypeFilter);

      /* Update desktop UI */
      if (desktopTypeBtn) {
        desktopTypeBtn.innerHTML = `${meta.icon}<span class="fab-tooltip">Tipo: ${meta.label}</span>`;
        desktopTypeBtn.classList.toggle('has-value', !!activityTypeFilter);
      }

      /* Sync both dropdowns */
      [typeFilterDropdown, desktopTypeDropdown].forEach(dropdown => {
        if (!dropdown) return;
        dropdown.querySelectorAll('.type-option').forEach(el => {
          const isSelected = el.dataset.value === activityTypeFilter;
          el.classList.toggle('selected', isSelected);
          el.setAttribute('aria-selected', isSelected ? 'true' : 'false');
        });
      });

      closeTypeDropdown('mobile');
      closeTypeDropdown('desktop');
      renderTerracesLayer();
    }


	function positionMobileTypeDropdown() {
	  if (window.innerWidth >= 720) return;
	  if (!typeFilterBtn || !typeFilterDropdown || !searchWrap) return;

	  const btnRect = typeFilterBtn.getBoundingClientRect();
	  const wrapRect = searchWrap.getBoundingClientRect();

	  const top = btnRect.bottom - wrapRect.top + 8;
	  const left = btnRect.left - wrapRect.left;

	  typeFilterDropdown.style.top = `${top}px`;
	  typeFilterDropdown.style.left = `${left}px`;
	}

    function openTypeDropdown(target = 'mobile') {
	  if (target === 'desktop') {
		desktopTypeDropdown?.classList.add('open');
		desktopTypeBtn?.setAttribute('aria-expanded', 'true');
	  } else {
		positionMobileTypeDropdown();
		typeFilterDropdown?.classList.add('open');
		typeFilterBtn?.setAttribute('aria-expanded', 'true');
	  }
	}

    function closeTypeDropdown(target = 'mobile') {
      if (target === 'desktop') {
        desktopTypeDropdown?.classList.remove('open');
        desktopTypeBtn?.setAttribute('aria-expanded', 'false');
      } else {
        typeFilterDropdown?.classList.remove('open');
        typeFilterBtn?.setAttribute('aria-expanded', 'false');
      }
    }

    typeFilterBtn?.addEventListener('click', (e) => {
      e.stopPropagation();
      typeFilterDropdown?.classList.contains('open') ? closeTypeDropdown('mobile') : openTypeDropdown('mobile');
    });

    desktopTypeBtn?.addEventListener('click', (e) => {
      e.stopPropagation();
      desktopTypeDropdown?.classList.contains('open') ? closeTypeDropdown('desktop') : openTypeDropdown('desktop');
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.type-filter-wrap') && !e.target.closest('.desktop-type-wrap')) {
        closeTypeDropdown('mobile');
        closeTypeDropdown('desktop');
      }
      if (!e.target.closest('#search-wrap')) closeAC();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeTypeDropdown('mobile'); closeTypeDropdown('desktop'); }
    });

    function formatActivityLabel(value) {
      const map = { 'bar': 'Bar', 'restaurante': 'Restaurante', 'cafeteria': 'Cafetería', 'cerveceria / taberna': 'Cervecería', 'comida rapida': 'Fast food', 'heladeria / dulces': 'Heladería' };
      return map[value] || (value.charAt(0).toUpperCase() + value.slice(1));
    }

    /* ── Green filter (shared between mobile + desktop) ── */
    function toggleGreenFilter() {
      greenFilterActive = !greenFilterActive;
      /* Mobile */
      greenFilterToggle?.classList.toggle('is-active', greenFilterActive);
      greenFilterToggle?.setAttribute('aria-pressed', greenFilterActive ? 'true' : 'false');
      /* Desktop */
      desktopGreenFilter?.classList.toggle('is-active', greenFilterActive);
      desktopGreenFilter?.setAttribute('aria-pressed', greenFilterActive ? 'true' : 'false');
      renderTerracesLayer();
    }

    greenFilterToggle?.addEventListener('click', toggleGreenFilter);
    desktopGreenFilter?.addEventListener('click', toggleGreenFilter);

    /* ════════════════════════════════════════
       TERRACE LAYER RENDERING
    ════════════════════════════════════════ */
    function getShadowPctForTerrace(terraceId) {
      const raw = shadowByTerraceId.get(Number(terraceId));
      if (raw === null || raw === undefined) return null;
      const n = Number(raw);
      if (!Number.isFinite(n)) return null;
      return n <= 1 ? n * 100 : n;
    }

    function getSunBucketFromShadowPct(pct) {
      if (pct === null) return 0;
      if (pct >= 75) return 0;
      if (pct >= 50) return 1;
      if (pct >= 25) return 2;
      return 3;
    }

    function getMarkerFillColor(feature) {
	  const terraceId = Number(feature?.properties?.id_terraza);
	  const pct = getShadowPctForTerrace(terraceId);
	  const bucket = getSunBucketFromShadowPct(pct);

	  let baseColor = '#2f6fb3';
	  if (bucket === 1) baseColor = '#6fa8dc';
	  else if (bucket === 2) baseColor = '#f4b942';
	  else if (bucket === 3) baseColor = '#d8572a';

	  const isSelected =
		selectedTerraceId !== null &&
		terraceId === Number(selectedTerraceId);

	  return isSelected ? '#0f3d68' : baseColor;
	}


    function renderTerracesLayer() {
	  if (!terracesGeojson) return;

	  if (terracesLayer) {
		map.removeLayer(terracesLayer);
		terracesLayer = null;
	  }

	  const filteredFeatures = terracesGeojson.features.filter(feature => {
		const passesGreen =
		  !greenFilterActive ||
		  Number(feature?.properties?.tiene_zona_ajardinada) === 1;

		const passesType = matchesActivityType(feature, activityTypeFilter);

		return passesGreen && passesType;
	  });

	  terracesLayer = L.geoJSON(
		{ ...terracesGeojson, features: filteredFeatures },
		{
		  pointToLayer: (feature, latlng) => {
			const terraceId = Number(feature?.properties?.id_terraza);
			const isSelected =
			  selectedTerraceId !== null &&
			  terraceId === Number(selectedTerraceId);

			return L.circleMarker(latlng, {
			  radius: isSelected ? 7 : 5,
			  color: '#ffffff',
			  weight: 2,
			  fillColor: getMarkerFillColor(feature),
			  fillOpacity: isSelected ? 1 : 0.92
			});
		  },
		  onEachFeature: (feature, layer) => {
			layer.on('click', () => selectTerraceFeature(feature));
		  }
		}
	  ).addTo(map);
	}

    function findTerraceFeatureById(terraceId) {
      if (!terracesGeojson?.features?.length) return null;
      return terracesGeojson.features.find(f => Number(f?.properties?.id_terraza) === Number(terraceId)) || null;
    }

    function selectTerraceFeature(feature) {
      if (!feature?.properties) return;
      const terraceId = Number(feature.properties.id_terraza);
      if (!Number.isFinite(terraceId)) return;

      selectedTerraceFeature = feature;
      selectedTerraceId = terraceId;
      selectedRotulo = safeText(feature.properties.rotulo);

      searchInput.value = selectedRotulo;
      searchClear.classList.add('visible');
      closeAC();
      searchInput.blur();
      document.activeElement?.blur();

      placeName.textContent = selectedRotulo;
      placeName.classList.remove('empty');

      renderTerraceInfo(feature);
      renderTerracesLayer();

      if (feature.geometry?.type === 'Point' && Array.isArray(feature.geometry.coordinates)) {
        const [lon, lat] = feature.geometry.coordinates;
        if (Number.isFinite(lon) && Number.isFinite(lat)) {
          map.flyTo([lat, lon], Math.max(map.getZoom(), 17), { duration: 0.5 });
        }
      }

      setSheetState('mid');
      scheduleLoad();
    }

    /* ════════════════════════════════════════
       DUCKDB
    ════════════════════════════════════════ */
    async function initDuckDB() {
      try {
        showStatus('Cargando datos…', false, true);
        const JSDELIVR_BUNDLES = duckdb.getJsDelivrBundles();
        const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);
        if (!bundle) throw new Error('No se pudo seleccionar un bundle de DuckDB-Wasm');

        const workerUrl = URL.createObjectURL(
          new Blob([`importScripts("${bundle.mainWorker}");`], { type: 'text/javascript' })
        );
        const worker = new Worker(workerUrl);
        const logger = new duckdb.ConsoleLogger();
        db = new duckdb.AsyncDuckDB(logger, worker);
        await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
        URL.revokeObjectURL(workerUrl);

        conn = await db.connect();
        await conn.query(`SET enable_progress_bar = false;`);
        await conn.query(`SET threads = 1;`);
        hideStatus();
      } catch (err) {
        showStatus('Error inicializando el motor de datos', true);
        console.error(err);
      }
    }

    async function ensureWeekRegistered(dateString) {
      if (!db) throw new Error('DuckDB no está inicializado');
      const alias = buildWeekAlias(dateString);
      const url = buildWeekUrl(dateString);
      if (registeredWeekAliases.has(alias)) return { alias, url };
      await db.registerFileURL(alias, url, duckdb.DuckDBDataProtocol.HTTP, true);
      registeredWeekAliases.add(alias);
      return { alias, url };
    }

    function buildDailyQuery(alias, terraceId, selectedDate, selectedHour) {
      const representativeDate = getRepresentativeWednesdayDateForSelectedWeek(selectedDate);
      return `
        SELECT terraza_id, rotulo, datetime, date, shadow_area_m2, shadow_pct,
               terrace_area_m2, building_id, geometry
        FROM read_parquet('${alias}')
        WHERE terraza_id = ${Number(terraceId)}
          AND substr(coalesce(cast(date as varchar), cast(datetime as varchar)), 1, 10) = '${representativeDate}'
          AND EXTRACT(HOUR FROM datetime) = ${Number(selectedHour)}
        ORDER BY datetime
      `;
    }

    function getFitPadding() {
      if (isMobileLayout()) return { paddingTopLeft: [24, 110], paddingBottomRight: [24, 320] };
      return { paddingTopLeft: [400, 40], paddingBottomRight: [40, 40] };
    }

    async function loadSelection() {
      if (!db || !conn) { showStatus('DuckDB-Wasm aún no está cargado', true); return; }
      if (!selectedTerraceId) return;

      const selectedDate = dateInput.value;
      const selectedHour = Number(hourSlider.value);

      if (!selectedDate) { showStatus('Selecciona una fecha', true); return; }
      if (selectedDate < MIN_DATE || selectedDate > MAX_DATE) {
        showStatus(`La fecha debe estar entre ${MIN_DATE} y ${MAX_DATE}`, true);
        return;
      }

      try {
        showStatus('Consultando datos…', false, true);
        noResult.style.display = 'none';

        const { alias } = await ensureWeekRegistered(selectedDate);
        const sql = buildDailyQuery(alias, selectedTerraceId, selectedDate, selectedHour);
        const result = await conn.query(sql);
        const rows = await arrowTableToRows(result);

        currentDayFeatures = rows.map((row, i) => {
          try { return rowToFeature(row, i); } catch (err) { console.error(err); return null; }
        }).filter(Boolean);

        clearLayer();

        if (!currentDayFeatures.length) {
          resetSummary();
          noResult.style.display = 'block';
          hideStatus();
          return;
        }

        currentLayer = L.geoJSON(currentDayFeatures, {
          style: () => ({
            color: '#24374d',
            weight: 2.4,
            fillColor: '#40566f',
            fillOpacity: 0.42,
            dashArray: '6 4',
            lineJoin: 'round'
          })
        }).addTo(map);

        try {
          const bounds = currentLayer.getBounds();
          if (bounds.isValid()) {
            map.fitBounds(bounds, { ...getFitPadding(), maxZoom: FIT_BOUNDS_MAX_ZOOM });
          }
        } catch (err) { console.error(err); }

        const raw = currentDayFeatures[0].properties.shadow_pct;
        const pct = raw !== null && raw !== undefined ? (raw <= 1 ? raw * 100 : raw) : null;
        updateRing(pct);
        hideStatus();
      } catch (err) {
        clearLayer();
        currentDayFeatures = [];
        resetSummary();
        showStatus('Error consultando los datos', true);
        console.error(err);
      }
    }

    function scheduleLoad() {
      clearTimeout(autoLoadTimeout);
      autoLoadTimeout = setTimeout(async () => {
        await refreshTerraceShadowColors();
        await loadSelection();
      }, 120);
    }

    /* ════════════════════════════════════════
       AUTOCOMPLETE
    ════════════════════════════════════════ */
    function getItemDisplayLabel(item) {
      return item.label_busqueda || item.rotulo_formateado || item.rotulo_original || `Terraza ${item.terraza_id}`;
    }

    function closeAC() {
      acList.innerHTML = '';
      acList.classList.remove('open');
      currentSuggestions = [];
      selectedSuggIdx = -1;
    }

    function renderAC(items) {
      currentSuggestions = items;
      selectedSuggIdx = -1;
      if (!items.length) { closeAC(); return; }
      acList.innerHTML = items.map((item, index) => {
        const title = escapeHtml(getItemDisplayLabel(item));
        const subtitle = item.direccion_resumen ? escapeHtml(item.direccion_resumen) : escapeHtml(item.nombre_via || '');
        return `
          <div class="ac-item" role="option" data-idx="${index}">
            <div class="ac-pin">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="white" stroke="none">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
              </svg>
            </div>
            <div class="ac-text">
              <div class="ac-title">${title}</div>
              <div class="ac-sub">${subtitle}</div>
            </div>
          </div>
        `;
      }).join('');
      acList.classList.add('open');
      acList.querySelectorAll('.ac-item').forEach(el => {
        el.addEventListener('mousedown', (e) => { e.preventDefault(); selectSuggestion(Number(el.dataset.idx)); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); selectSuggestion(Number(el.dataset.idx)); });
      });
    }

    function highlightAC() {
      acList.querySelectorAll('.ac-item').forEach((el, i) => {
        el.classList.toggle('active', i === selectedSuggIdx);
      });
    }

    function searchCatalog(query) {
      const q = normalizeText(query);
      if (!q) return [];
      const starts = [], contains = [];
      for (const item of rotulosCatalog) {
        if (!item._search_blob.includes(q)) continue;
        const label = normalizeText(getItemDisplayLabel(item));
        label.startsWith(q) ? starts.push(item) : contains.push(item);
      }
      return [...starts, ...contains].slice(0, 12);
    }

    function selectSuggestion(index) {
      const item = currentSuggestions[index];
      if (!item) return;
      const feature = findTerraceFeatureById(item.terraza_id);
      if (feature) { selectTerraceFeature(feature); return; }

      selectedTerraceId = item.terraza_id;
      selectedRotulo = getItemDisplayLabel(item);
      searchInput.value = selectedRotulo;
      searchClear.classList.add('visible');
      closeAC();
      searchInput.blur();
      document.activeElement?.blur();

      placeName.textContent = selectedRotulo;
      placeName.classList.remove('empty');
      setSheetState('mid');
      scheduleLoad();
    }

    /* ── Search listeners ── */
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim();
      searchClear.classList.toggle('visible', query.length > 0);
      renderAC(searchCatalog(query));
    });

    searchInput.addEventListener('focus', () => {
      const query = searchInput.value.trim();
      if (!query) return;
      renderAC(searchCatalog(query));
    });

    searchInput.addEventListener('keydown', (e) => {
      if (!acList.classList.contains('open')) {
        if (e.key === 'Enter') {
          const suggestions = searchCatalog(searchInput.value.trim());
          if (suggestions.length === 1) { e.preventDefault(); currentSuggestions = suggestions; selectSuggestion(0); }
        }
        return;
      }
      if (e.key === 'ArrowDown') { e.preventDefault(); selectedSuggIdx = Math.min(selectedSuggIdx + 1, currentSuggestions.length - 1); highlightAC(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); selectedSuggIdx = Math.max(selectedSuggIdx - 1, 0); highlightAC(); }
      else if (e.key === 'Enter') { e.preventDefault(); selectSuggestion(selectedSuggIdx >= 0 ? selectedSuggIdx : (currentSuggestions.length === 1 ? 0 : -1)); }
      else if (e.key === 'Escape') closeAC();
    });

    searchInput.addEventListener('blur', () => { setTimeout(() => closeAC(), 150); });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      closeAC();
      selectedTerraceId = null;
      selectedRotulo = null;
      selectedTerraceFeature = null;
      placeName.textContent = 'Selecciona una terraza';
      placeName.classList.add('empty');
      terraceInfoSection.classList.add('hidden');
      renderTerracesLayer();
      searchInput.focus();
    });

    dateInput.addEventListener('change', () => scheduleLoad());
    dateInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadSelection(); });

    hourSlider.addEventListener('input', () => {
      const hour = clampHour(hourSlider.value);
      hourSlider.value = hour;
      updateHour(hour);
      scheduleLoad();
    });



	window.addEventListener('resize', () => {
	  if (typeFilterDropdown.classList.contains('open') && window.innerWidth < 720) {
		positionMobileTypeDropdown();
	  }
	});

	document.getElementById('mobile-filters-bar')?.addEventListener('scroll', () => {
	  if (typeFilterDropdown.classList.contains('open') && window.innerWidth < 720) {
		positionMobileTypeDropdown();
	  }
	});

    /* ════════════════════════════════════════
       DESKTOP INIT
    ════════════════════════════════════════ */
    function checkDesktop() {
	  const isDesktop = window.innerWidth >= 720;

	  if (desktopLabel) {
		desktopLabel.style.display = isDesktop ? 'block' : 'none';
	  }

	  if (desktopFabDivider) {
		desktopFabDivider.style.display = isDesktop ? 'block' : 'none';
	  }

	  if (desktopGreenFilter) {
		desktopGreenFilter.style.display = isDesktop ? 'flex' : 'none';
	  }

	  if (desktopTypeWrap) {
		desktopTypeWrap.style.display = isDesktop ? 'block' : 'none';
	  }

	  updateLegendVisibility();
	}

    function pad2(n) { return String(n).padStart(2, '0'); }

    function getInitialDateAndHour() {
      const now = new Date();
      let ymd = `${now.getFullYear()}-${pad2(now.getMonth()+1)}-${pad2(now.getDate())}`;
      if (ymd < MIN_DATE) ymd = MIN_DATE;
      if (ymd > MAX_DATE) ymd = MAX_DATE;
      return { ymd, hour: clampHour(now.getHours()) };
    }

    function setInitialDateAndHour() {
      const { ymd, hour } = getInitialDateAndHour();
      dateInput.value = ymd;
      hourSlider.value = hour;
      updateHour(hour);
    }

    /* ════════════════════════════════════════
       BOOT
    ════════════════════════════════════════ */
    checkDesktop();
    window.addEventListener('resize', checkDesktop);

    setInitialDateAndHour();
    resetSummary();
    setSheetState('peek', false);

    restoreSavedLocation();

    await loadRotulosCatalog();
    await loadTerracesGeojson();
    await initDuckDB();
    await refreshTerraceShadowColors();
    renderTerracesLayer();
    updateLegendVisibility();
  </script>
</body>
