<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Visor de Sombras · Terrazas</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="map"></div>

  <!-- ══ SEARCH OVERLAY ══ -->
  <div id="search-overlay">
    <div id="search-wrap">
      <div id="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="rotuloSearchInput" type="text" placeholder="Busca por bar o dirección…" autocomplete="off" autocorrect="off" spellcheck="false" />
        <button id="search-clear" aria-label="Borrar búsqueda">×</button>
      </div>

      <div id="autocompleteList" role="listbox"></div>

      <!-- Mobile horizontal filter bar -->
      <div id="mobile-filters-bar" aria-label="Filtros">
        <button id="green-filter-toggle" type="button" class="filter-chip" aria-pressed="false" aria-label="Filtrar terrazas con zonas verdes cercanas">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
            <path d="M12 21c0-4.2 1.2-7.2 3.4-9.4 2.3-2.3 5.1-3.3 6.1-3.6.2 1-.1 3.8-2.4 6.1-2 2-4.5 3-7.1 3.2M12 21c0-3.6-.9-6.1-2.7-7.9C7.1 10.9 4.4 10 3.3 9.7c-.2 1 .1 3.6 2.2 5.7 1.8 1.8 4 2.8 6.5 3"
              fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Zonas verdes</span>
        </button>

        <div class="type-filter-wrap">
          <button id="type-filter-btn" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="Filtrar por tipo de local">
            <span class="type-btn-prefix">Tipo</span>
            <span class="type-btn-label" id="type-btn-label-text">Todos</span>
            <svg class="type-btn-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Mobile type dropdown portal (positioned absolutely via JS) -->
      <div id="mobile-type-dropdown-portal"></div>
    </div>
  </div>

  <!-- ══ FAB COLUMN (shared mobile + desktop) ══ -->
  <div id="fab-column" aria-label="Acciones del mapa">
    <a id="fab-ranking" class="fab-btn" href="./ranking.html" aria-label="Ir al ranking de terrazas">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <rect x="3" y="11" width="4" height="8" rx="1.5" fill="#22c55e"/>
        <rect x="10" y="7" width="4" height="12" rx="1.5" fill="#8b5cf6"/>
        <rect x="17" y="4" width="4" height="15" rx="1.5" fill="#06b6d4"/>
      </svg>
      <span class="fab-tooltip">Ranking</span>
    </a>

    <button id="fab-locate" class="fab-btn" type="button" aria-label="Centrar mapa en mi ubicación">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="#0f3d68" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2"  y1="12" x2="5"  y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <circle cx="12" cy="12" r="7" stroke-opacity="0.3"/>
      </svg>
      <span class="fab-tooltip">Mi ubicación</span>
    </button>

    <a id="fab-info" class="fab-btn" href="./Infoterrazas.html" aria-label="Ir a información adicional">
      <svg viewBox="0 0 24 24" width="19" height="19" aria-hidden="true">
        <circle cx="12" cy="12" r="9" fill="none" stroke="#0f3d68" stroke-width="2"/>
        <line x1="12" y1="10" x2="12" y2="16" stroke="#0f3d68" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="7" r="1.2" fill="#0f3d68"/>
      </svg>
      <span class="fab-tooltip">Info</span>
    </a>

    <!-- Desktop-only: divider + filter buttons -->
    <div id="desktop-fab-divider" style="display:none;"></div>

    <button id="desktop-green-filter" type="button" style="display:none;" aria-pressed="false" aria-label="Filtrar terrazas con zonas verdes cercanas">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path d="M12 21c0-4.2 1.2-7.2 3.4-9.4 2.3-2.3 5.1-3.3 6.1-3.6.2 1-.1 3.8-2.4 6.1-2 2-4.5 3-7.1 3.2M12 21c0-3.6-.9-6.1-2.7-7.9C7.1 10.9 4.4 10 3.3 9.7c-.2 1 .1 3.6 2.2 5.7 1.8 1.8 4 2.8 6.5 3"
          fill="none" stroke="#166534" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="fab-tooltip">Terrazas con zonas verdes a 50m</span>
    </button>

    <div class="desktop-type-wrap" id="desktop-type-wrap" style="display:none;">
      <button id="desktop-type-btn" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="Filtrar por tipo de local">
        🗂️
        <span class="fab-tooltip">Tipo de local</span>
      </button>
      <div id="desktop-type-dropdown" role="listbox" aria-label="Tipo de local"></div>
    </div>
  </div>

  <!-- ══ BOTTOM SHEET ══ -->
  <div id="sheet" data-state="peek" role="complementary" aria-label="Información de terraza">
    <div id="sheet-handle-area" aria-hidden="true">
      <div class="handle-pill"></div>
    </div>

    <div id="sheet-content">
      <button id="sheet-close" aria-label="Cerrar panel">×</button>
      <span class="sheet-top-label" style="display:none" id="desktop-label">Visor de Sombras</span>

      <div id="place-header">
        <div id="place-name" class="empty">Selecciona una terraza</div>
      </div>

      <div class="divider" id="place-divider"></div>

      <!-- Shadow ring + summary -->
      <div id="shadow-ring-wrap">
        <div class="ring-svg-wrap">
          <svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle id="ring-track" cx="36" cy="36" r="28" fill="none" stroke-width="7"/>
            <circle id="ring-fill" cx="36" cy="36" r="28" fill="none" stroke-width="7"
              stroke-dasharray="175.93"
              stroke-dashoffset="175.93"/>
          </svg>
          <div class="ring-label" id="ring-label-text">—<br><span>sombra</span></div>
        </div>
        <div class="shadow-info">
          <div class="info-label">Sombra estimada</div>
          <div class="info-value" id="shadow-pct-value">—</div>
          <div class="info-note" id="shadow-time-note">Selecciona lugar, fecha y hora</div>
        </div>
      </div>

      <!-- No results notice -->
      <div id="no-result">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <circle cx="12" cy="16" r="0.5" fill="currentColor"/>
        </svg>
        <p>Sin datos para esta selección</p>
      </div>

      <div class="divider"></div>

      <!-- Date control -->
      <div class="ctrl-section">
        <div class="ctrl-label">Fecha</div>
        <input id="dateInput" type="date" value="2026-01-01" min="2026-01-01" max="2026-12-31" />
      </div>

      <!-- Hour slider -->
      <div class="ctrl-section">
        <div class="ctrl-label">Hora del día</div>
        <div class="hour-track-wrap">
          <div class="hour-header">
            <div class="hour-hint">Desliza para cambiar la hora</div>
            <div class="hour-badge" id="hourBadge">12:00</div>
          </div>
          <input id="hourSlider" type="range" min="6" max="21" step="1" value="12" aria-label="Hora" />
          <div class="hour-range-labels"><span>6:00</span><span>21:00</span></div>
        </div>

        <!-- Terrace detail card (shown after selection) -->
        <div id="terrace-info-section" class="ctrl-section terrace-info-section hidden">
          <div class="ctrl-label">Información de la terraza</div>
          <div id="terrace-info-card" class="terrace-info-card"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status toast -->
  <div id="status-pill" role="status" aria-live="polite"></div>

  <!-- Shadow legend -->
  <div id="shadow-legend" aria-hidden="true">
    <div class="legend-title">Exposición al sol</div>
    <div class="legend-scale">
      <span class="lg-stop shade"></span>
      <span class="lg-stop soft"></span>
      <span class="lg-stop warm"></span>
      <span class="lg-stop sun"></span>
    </div>
    <div class="legend-labels">
      <span>Más sombra</span>
      <span>Más sol ☀️</span>
    </div>
  </div>

  <!-- External libraries -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.js"></script>

  <!-- Main app (ES module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
